name: Bridgefee
options:
  bundleIdPrefix: com.shimondeitel.bridgetoll
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Bridgefee:
    type: application
    platform: iOS
    sources:
      - path: Bridgefee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bridgetoll
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Bridgefee/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BridgefeeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BridgefeeTests
      - path: Bridgefee.storekit
    dependencies:
      - target: Bridgefee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bridgetoll.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BridgefeeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BridgefeeUITests
    dependencies:
      - target: Bridgefee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bridgetoll.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Bridgefee:
    build:
      targets:
        Bridgefee: all
        BridgefeeTests: [test]
        BridgefeeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Bridgefee.storekit
    test:
      config: Debug
      storeKitConfiguration: Bridgefee.storekit
      targets:
        - BridgefeeTests
        - BridgefeeUITests
    archive:
      config: Release
